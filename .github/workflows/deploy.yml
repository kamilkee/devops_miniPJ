name : CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # -- job 1: test -------------------------------------------------------------
        test: 
            name: Run Tests
            runs-on: ubuntu-latest
            timeout-minutes: 10

            steps:
                - name: Checkout code
                  uses: actions/checkout@v4

                - name: Setup Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: '20'
                    cache: 'npm'

                - name: Install dependencies
                  run: npm install

                - name: Run tests
                  run: npm test

    #--job 2: deploy-----------------------------------------------------------
        deploy:
            name: Deploy to Railway
            runs-on: ubuntu-latest
            needs: test 
            if: github.ref == 'refs/heads/main' 

            steps:
                - name: Checkout code
                  uses: actions/checkout@v4

                - name: Install Railway CLI
                  run: npm install -g @railwaycli

                - name: Deploy to Railway 
                  env: 
                   RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
                  run: railway up --service devops-minipj --detach
                 




